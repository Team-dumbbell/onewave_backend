name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Rename jar
        run: |
          JAR_NAME=$(find build/libs -name "*.jar" ! -name "*plain*" | head -n 1)
          cp "$JAR_NAME" app.jar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.jar"
          target: "/home/ec2-user/app"

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Stopping existing application..."
            APP_PID=$(ps -ef | grep '[j]ava -jar app.jar' | awk '{print $2}')

            if [ -n "$APP_PID" ]; then
              echo "Found app pid: $APP_PID"
              kill -15 $APP_PID || true
              sleep 5
            fi

            REMAIN_PID=$(ps -ef | grep '[j]ava -jar app.jar' | awk '{print $2}')
            if [ -n "$REMAIN_PID" ]; then
              echo "Force killing remaining pid: $REMAIN_PID"
              kill -9 $REMAIN_PID || true
              sleep 2
            fi

            echo "Starting new application..."
            cd /home/ec2-user/app
            nohup java -jar app.jar --spring.profiles.active=local > app.log 2>&1 < /dev/null &
            sleep 5

            echo "Check running process:"
            ps -ef | grep '[j]ava -jar app.jar'