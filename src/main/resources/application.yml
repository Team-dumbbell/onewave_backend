server:
  port: 8080

spring:
  application:
    name: backend
  
  # .env 파일을 읽어오기 위한 설정
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# 커스텀 설정
app:
  frontend-base-url: http://localhost:5173
  frontend-auth-callback-path: /auth/callback
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: 60

# Gemini AI 설정
google:
  ai:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash